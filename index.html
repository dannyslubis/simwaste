<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Sorting Sampah</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background-color: #111; display: flex; justify-content: center;
            align-items: center; height: 100vh; overflow: hidden; touch-action: none;
            font-family: 'VT323', monospace, sans-serif; user-select: none; -webkit-user-select: none;
        }
        #game-container { position: relative; width: 100vw; max-width: 1024px; aspect-ratio: 16 / 9; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; background-color: #222; }
        
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 9999; }
        .dpad { position: absolute; left: 8%; bottom: 12%; width: 22%; max-width: 160px; aspect-ratio: 1; background: url('keywasd.png') no-repeat center/contain; opacity: 0.5; pointer-events: auto; }
        .d-btn { position: absolute; width: 33.33%; height: 33.33%; cursor: pointer; }
        .d-up { top: 0; left: 33.33%; } .d-down { bottom: 0; left: 33.33%; } .d-left { top: 33.33%; left: 0; } .d-right { top: 33.33%; right: 0; }
        .btn-action { position: absolute; right: 8%; bottom: 15%; width: 12%; max-width: 80px; aspect-ratio: 1; background: url('keyaction.png') no-repeat center/contain; opacity: 0.5; pointer-events: auto; cursor: pointer; }
        .btn-active { opacity: 0.8 !important; }

        /* Overlay Animasi Tutorial (pointer-events: none agar klik tembus ke canvas) */
        #tutorialOverlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="512" height="288"></canvas>
    
    <img id="tutorialOverlay" src="popuptutwas.gif" alt="Tutorial">

    <div class="ui-layer">
        <div class="dpad" id="dpad-container">
            <div class="d-btn d-up" id="btn-up"></div> <div class="d-btn d-down" id="btn-down"></div>
            <div class="d-btn d-left" id="btn-left"></div> <div class="d-btn d-right" id="btn-right"></div>
        </div>
        <div class="btn-action" id="btn-action"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // --- STATE MACHINE ---
    const STATE = { PLAY: 0, EXIT_PROMPT: 1, HELP_PROMPT: 2 };
    let currentState = STATE.PLAY;

    // --- MANAJEMEN ASET ---
    const assets = {
        bg: new Image(), charIdle: new Image(), charWalk: new Image(),
        charO: new Image(), charA: new Image(), charB: new Image(),
        binO: new Image(), binA: new Image(), binB: new Image(),
        waso1: new Image(), waso2: new Image(), waso3: new Image(), waso4: new Image(),
        wasa1: new Image(), wasa2: new Image(), wasa3: new Image(), wasa4: new Image(),
        wasb1: new Image(), wasb2: new Image(),
        wascarl1: new Image(), wascarl2: new Image(), wascarl3: new Image(), wascarl4: new Image(),
        wascarr1: new Image(), wascarr2: new Image(), wascarr3: new Image(), wascarr4: new Image(),
        
        // Aset UI Baru
        statwas: new Image(), statwaso: new Image(), statwasa: new Image(), statwasb: new Image(),
        statwas1: new Image(), popupexit: new Image()
    };
    
    assets.bg.src = 'kanvaswas.png';
    assets.charIdle.src = 'waschar.png'; assets.charWalk.src = 'waschar.gif'; 
    assets.charO.src = 'wascharo.png'; assets.charA.src = 'waschara.png'; assets.charB.src = 'wascharb.png';
    assets.binO.src = 'waso.png'; assets.binA.src = 'wasa.png'; assets.binB.src = 'wasb.png';
    assets.waso1.src = 'waso1.png'; assets.waso2.src = 'waso2.png'; assets.waso3.src = 'waso3.png'; assets.waso4.src = 'waso4.png';
    assets.wasa1.src = 'wasa1.png'; assets.wasa2.src = 'wasa2.png'; assets.wasa3.src = 'wasa3.png'; assets.wasa4.src = 'wasa4.png';
    assets.wasb1.src = 'wasb1.png'; assets.wasb2.src = 'wasb2.png';
    assets.wascarl1.src = 'wascarl1.png'; assets.wascarl2.src = 'wascarl2.png'; assets.wascarl3.src = 'wascarl3.png'; assets.wascarl4.src = 'wascarl4.png';
    assets.wascarr1.src = 'wascarr1.png'; assets.wascarr2.src = 'wascarr2.png'; assets.wascarr3.src = 'wascarr3.png'; assets.wascarr4.src = 'wascarr4.png';
    
    // Source UI Baru
    assets.statwas.src = 'statwas.png'; assets.statwaso.src = 'statwaso.png';
    assets.statwasa.src = 'statwasa.png'; assets.statwasb.src = 'statwasb.png';
    assets.statwas1.src = 'statwas1.png'; assets.popupexit.src = 'popupexit.png';

    const TILE_SIZE = 32;
    function gridToPx(colStr, rowNum) { return { x: (colStr.charCodeAt(0) - 97) * TILE_SIZE, y: (rowNum - 1) * TILE_SIZE }; }

    // --- STATE GAME ---
    let keys = { w: false, a: false, s: false, d: false, action: false };
    let actionTriggered = false; let floatingTexts = [];
    let gameStartTime = null; let isCrashed = false; let crashTimer = 0; let fadeAlpha = 0;
    
    let totalCollected = 0;
    const TOTAL_TRASH = 16;
    let showWrongTrashAlert = 0; // Timer untuk statwas1.png

    let player = {
        x: gridToPx('f', 9).x, y: gridToPx('f', 9).y,
        targetX: gridToPx('f', 9).x, targetY: gridToPx('f', 9).y,
        carrying: null, isMoving: false, facingRight: true, inventory: []
    };

    let bins = [
        { type: 'organik', px: gridToPx('b', 9).x, py: gridToPx('b', 9).y, active: true, img: assets.binO },
        { type: 'anorganik', px: gridToPx('c', 9).x, py: gridToPx('c', 9).y, active: true, img: assets.binA },
        { type: 'b3', px: gridToPx('d', 9).x, py: gridToPx('d', 9).y, active: true, img: assets.binB }
    ];

    const trashData = [
        { id: 'waso1', type: 'organik', img: assets.waso1, locs: ['m4'] }, { id: 'waso2', type: 'organik', img: assets.waso2, locs: ['a6','b6','h5','m9','o6'] },
        { id: 'waso3', type: 'organik', img: assets.waso3, locs: ['m6'] }, { id: 'waso4', type: 'organik', img: assets.waso4, locs: ['n9'] },
        { id: 'wasa1', type: 'anorganik', img: assets.wasa1, locs: ['e2','p9'] }, { id: 'wasa2', type: 'anorganik', img: assets.wasa2, locs: ['k6'] },
        { id: 'wasa3', type: 'anorganik', img: assets.wasa3, locs: ['h3'] }, { id: 'wasa4', type: 'anorganik', img: assets.wasa4, locs: ['b4','d6'] },
        { id: 'wasb1', type: 'b3', img: assets.wasb1, locs: ['p2'] }, { id: 'wasb2', type: 'b3', img: assets.wasb2, locs: ['a4'] }
    ];

    let itemsMap = [];
    trashData.forEach(t => {
        t.locs.forEach(loc => {
            let pos = gridToPx(loc.charAt(0), parseInt(loc.substring(1)));
            itemsMap.push({ x: pos.x, y: pos.y, type: t.type, img: t.img, active: true });
        });
    });

    let activeCars = [];
    const laneAtasY = gridToPx('a', 7).y; const laneBawahY = gridToPx('a', 8).y;
    const carSpawners = [
        { img: assets.wascarl1, y: laneAtasY, baseSpeed: 3.5, interval: 30000, nextSpawn: 0 }, { img: assets.wascarl2, y: laneAtasY, baseSpeed: 3.0, interval: 25000, nextSpawn: 8000 },
        { img: assets.wascarl3, y: laneAtasY, baseSpeed: 2.5, interval: 20000, nextSpawn: 16000 }, { img: assets.wascarl4, y: laneAtasY, baseSpeed: 3.0, interval: 40000, nextSpawn: 26000 },
        { img: assets.wascarr1, y: laneBawahY, baseSpeed: -3.5, interval: 25000, nextSpawn: 0 }, { img: assets.wascarr2, y: laneBawahY, baseSpeed: -3.0, interval: 30000, nextSpawn: 10000 },
        { img: assets.wascarr3, y: laneBawahY, baseSpeed: -2.5, interval: 20000, nextSpawn: 18000 }, { img: assets.wascarr4, y: laneBawahY, baseSpeed: -3.0, interval: 45000, nextSpawn: 28000 }
    ];

    function isSolid(x, y) {
        let col = Math.round(x / TILE_SIZE); let row = Math.round(y / TILE_SIZE);
        if (row === 0) return true; if (col === 15 && row === 3) return true; return false;
    }
    function hasTopWall(x, y) {
        let col = Math.round(x / TILE_SIZE); let row = Math.round(y / TILE_SIZE);
        if ((col === 13 || col === 14) && row === 2) return true; 
        if (col >= 0 && col <= 3 && row === 4) return true; 
        if (col >= 8 && col <= 15 && row === 4) return true; 
        if (col === 4 && row === 5) return true; 
        if (col === 0 && row === 8) return true; 
        return false;
    }
    function checkOnZebraCross(px, py) {
        let col = Math.round(px / TILE_SIZE); let row = Math.round(py / TILE_SIZE);
        return (col === 5 || col === 6) && (row === 6 || row === 7);
    }

    function triggerCrash() {
        if (isCrashed) return;
        isCrashed = true; crashTimer = Date.now();
        if (player.carrying !== null) {
            let droppedType = player.carrying; player.carrying = null;
            let bin = bins.find(b => b.type === droppedType);
            if (bin) bin.active = true;
            if (player.inventory.length > 0) {
                let droppedItem = player.inventory.pop();
                spawnExactTrash(droppedItem);
            }
        }
    }

    function spawnExactTrash(itemObj) {
        let possibleTiles = [];
        for(let c=0; c<=15; c++) possibleTiles.push({c:c, r:5});
        for(let c=4; c<=15; c++) possibleTiles.push({c:c, r:8});
        
        let emptyTiles = possibleTiles.filter(pt => {
            let px = pt.c * TILE_SIZE; let py = pt.r * TILE_SIZE;
            if (bins.some(b => b.px === px && b.py === py)) return false;
            if (itemsMap.some(i => i.active && Math.abs(i.x - px) < 10 && Math.abs(i.y - py) < 10)) return false;
            return true;
        });

        if (emptyTiles.length === 0) {
            for(let c=0; c<=15; c++) {
                let px = c * TILE_SIZE; let py = 4 * TILE_SIZE;
                if (!itemsMap.some(i => i.active && Math.abs(i.x - px) < 10 && Math.abs(i.y - py) < 10)) emptyTiles.push({c:c, r:4});
            }
        }
        if (emptyTiles.length > 0) {
            let randTile = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
            itemObj.x = randTile.c * TILE_SIZE; itemObj.y = randTile.r * TILE_SIZE; itemObj.active = true;
        }
    }

    // --- KONTROL INPUT & STATE MACHINE POINTER ---
    canvas.addEventListener('pointerdown', (e) => {
        // Normalisasi koordinat klik agar akurat meski kanvas di-scale CSS
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        e.stopPropagation(); 

        if (currentState === STATE.PLAY) {
            // Klik p1 (Tombol X) -> Buka Pop Up Keluar
            if (x >= 480 && x <= 512 && y >= 0 && y <= 32) {
                currentState = STATE.EXIT_PROMPT;
                // Reset pergerakan player jika sedang jalan saat dipause
                player.isMoving = false; player.x = player.targetX; player.y = player.targetY;
            }
            // Klik o1/p2 (Tombol ?) -> Buka Pop Up Tutorial
            else if (x >= 480 && x <= 512 && y >= 32 && y <= 64) {
                currentState = STATE.HELP_PROMPT;
                document.getElementById('tutorialOverlay').style.display = 'block';
                player.isMoving = false; player.x = player.targetX; player.y = player.targetY;
            }
        } 
        else if (currentState === STATE.EXIT_PROMPT) {
            // Logika tombol Yes/No di dalam popupexit.png
            if (x >= 160 && x <= 256 && y >= 160 && y <= 192) {
                console.log("Fungsi Keluar dari game dieksekusi!");
                alert("Simulasi ditutup. Kembali ke Mode VN/Menu.");
            }
            else if (x >= 256 && x <= 352 && y >= 160 && y <= 192) {
                currentState = STATE.PLAY; // Batal keluar
            }
        }
        else if (currentState === STATE.HELP_PROMPT) {
            // Tutup tutorial HANYA jika pemain menekan tombol X di koordinat p1
            if (x >= 480 && x <= 512 && y >= 0 && y <= 32) {
                currentState = STATE.PLAY;
                document.getElementById('tutorialOverlay').style.display = 'none';
            }
        }
    });

    function setKey(k, val) { keys[k] = val; }
    window.addEventListener('keydown', (e) => {
        if (currentState !== STATE.PLAY) return; // Kunci keyboard saat di menu
        if (e.key === 'w' || e.key === 'ArrowUp') setKey('w', true);
        if (e.key === 's' || e.key === 'ArrowDown') setKey('s', true);
        if (e.key === 'a' || e.key === 'ArrowLeft') setKey('a', true);
        if (e.key === 'd' || e.key === 'ArrowRight') setKey('d', true);
        if (e.key === ' ' || e.key === 'Enter') setKey('action', true);
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'w' || e.key === 'ArrowUp') setKey('w', false);
        if (e.key === 's' || e.key === 'ArrowDown') setKey('s', false);
        if (e.key === 'a' || e.key === 'ArrowLeft') setKey('a', false);
        if (e.key === 'd' || e.key === 'ArrowRight') setKey('d', false);
        if (e.key === ' ' || e.key === 'Enter') { setKey('action', false); actionTriggered = false; }
    });
    
    const dpadZones = [ { id: 'btn-up', key: 'w' }, { id: 'btn-down', key: 's' }, { id: 'btn-left', key: 'a' }, { id: 'btn-right', key: 'd' } ];
    dpadZones.forEach(zone => {
        let el = document.getElementById(zone.id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); if(currentState === STATE.PLAY) setKey(zone.key, true); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); setKey(zone.key, false); });
        el.addEventListener('mousedown', (e) => { e.preventDefault(); if(currentState === STATE.PLAY) setKey(zone.key, true); });
        el.addEventListener('mouseup', (e) => { e.preventDefault(); setKey(zone.key, false); });
        el.addEventListener('mouseleave', (e) => { e.preventDefault(); setKey(zone.key, false); });
    });
    let btnAct = document.getElementById('btn-action');
    btnAct.addEventListener('touchstart', (e) => { e.preventDefault(); if(currentState === STATE.PLAY) { setKey('action', true); btnAct.classList.add('btn-active'); } });
    btnAct.addEventListener('touchend', (e) => { e.preventDefault(); setKey('action', false); actionTriggered = false; btnAct.classList.remove('btn-active'); });
    btnAct.addEventListener('mousedown', (e) => { e.preventDefault(); if(currentState === STATE.PLAY) { setKey('action', true); btnAct.classList.add('btn-active'); } });
    btnAct.addEventListener('mouseup', (e) => { e.preventDefault(); setKey('action', false); actionTriggered = false; btnAct.classList.remove('btn-active'); });
    btnAct.addEventListener('mouseleave', (e) => { e.preventDefault(); setKey('action', false); actionTriggered = false; btnAct.classList.remove('btn-active'); });

    function showText(text, x, y) { floatingTexts.push({ text: text, x: x + 16, y: y, life: 60 }); }
    function checkDistance(x1, y1, x2, y2) { return Math.sqrt(Math.pow((x1+16) - (x2+16), 2) + Math.pow((y1+16) - (y2+16), 2)); }

    // --- UPDATE LOOP ---
    function update() {
        if (!gameStartTime) gameStartTime = Date.now();
        let now = Date.now() - gameStartTime; let realNow = Date.now();

        // Mengurangi Timer UI Wrong Trash
        if (showWrongTrashAlert > 0) showWrongTrashAlert--;

        // Mobil Tetap Bergerak walau sedang di menu (Dunia tetap hidup)
        carSpawners.forEach(s => {
            if (now >= s.nextSpawn) {
                activeCars.push({ img: s.img, x: s.baseSpeed > 0 ? -64 : canvas.width, y: s.y, baseSpeed: s.baseSpeed, currentSpeed: s.baseSpeed });
                while (s.nextSpawn <= now) { s.nextSpawn += s.interval; }
            }
        });

        let onZebra = checkOnZebraCross(player.x, player.y) && !isCrashed;

        for (let i = activeCars.length - 1; i >= 0; i--) {
            let car = activeCars[i];
            let isStoppedByZebra = false;

            if (onZebra) {
                if (car.baseSpeed > 0) {
                    let front = car.x + 64;
                    if (front <= 160 && front + car.baseSpeed >= 160) { car.x = 160 - 64; isStoppedByZebra = true; } 
                    else if (front === 160) isStoppedByZebra = true;
                } else {
                    let front = car.x;
                    if (front >= 224 && front + car.baseSpeed <= 224) { car.x = 224; isStoppedByZebra = true; } 
                    else if (front === 224) isStoppedByZebra = true;
                }
            }
            car.currentSpeed = isStoppedByZebra ? 0 : car.baseSpeed;

            let carAhead = null; let minDx = Infinity;
            for (let other of activeCars) {
                if (other === car || other.y !== car.y) continue;
                if (car.baseSpeed > 0 && other.x > car.x) {
                    let dx = other.x - car.x;
                    if (dx < minDx) { minDx = dx; carAhead = other; }
                } else if (car.baseSpeed < 0 && other.x < car.x) {
                    let dx = car.x - other.x;
                    if (dx < minDx) { minDx = dx; carAhead = other; }
                }
            }

            if (carAhead && minDx <= 96) {
                if (Math.abs(car.currentSpeed) > Math.abs(carAhead.currentSpeed)) { car.currentSpeed = carAhead.currentSpeed; }
                if (car.baseSpeed > 0 && car.x + car.currentSpeed > carAhead.x - 96) { car.x = carAhead.x - 96; car.currentSpeed = 0; } 
                else if (car.baseSpeed < 0 && car.x + car.currentSpeed < carAhead.x + 96) { car.x = carAhead.x + 96; car.currentSpeed = 0; }
            }

            car.x += car.currentSpeed;

            // Cek Tabrakan HANYA jika sedang PLAY
            if (currentState === STATE.PLAY && !isCrashed && !onZebra) {
                if (player.x + 24 > car.x && player.x + 8 < car.x + 64 &&
                    player.y + 24 > car.y && player.y + 8 < car.y + 32) {
                    triggerCrash();
                }
            }

            if (car.baseSpeed > 0 && car.x > canvas.width + 64) activeCars.splice(i, 1);
            else if (car.baseSpeed < 0 && car.x < -128) activeCars.splice(i, 1);
        }

        // Segala Hal Terkait Input & Player Berhenti Jika Bukan Mode PLAY
        if (currentState !== STATE.PLAY) return;

        // Logika Fade & Reset Crash
        if (isCrashed) {
            let elapsed = realNow - crashTimer;
            if (elapsed < 500) fadeAlpha = elapsed / 500;
            else if (elapsed < 2500) fadeAlpha = 1;
            else if (elapsed < 3000) fadeAlpha = 1 - ((elapsed - 2500) / 500);
            else {
                isCrashed = false; fadeAlpha = 0;
                player.x = player.targetX = gridToPx('f', 9).x;
                player.y = player.targetY = gridToPx('f', 9).y;
            }
        }

        if (!isCrashed) {
            let currentSpeed = player.carrying !== null ? 2.0 : 2.5;

            if (!player.isMoving) {
                if (keys.w && player.y > 0) { 
                    if (!hasTopWall(player.x, player.y) && !isSolid(player.x, player.y - TILE_SIZE)) { player.targetY -= TILE_SIZE; player.isMoving = true; }
                } else if (keys.s && player.y < canvas.height - TILE_SIZE) { 
                    if (!isSolid(player.x, player.y + TILE_SIZE) && !hasTopWall(player.x, player.y + TILE_SIZE)) { player.targetY += TILE_SIZE; player.isMoving = true; }
                } else if (keys.a && player.x > 0) { 
                    if (!isSolid(player.x - TILE_SIZE, player.y)) { player.targetX -= TILE_SIZE; player.isMoving = true; player.facingRight = false; }
                } else if (keys.d && player.x < canvas.width - TILE_SIZE) { 
                    if (!isSolid(player.x + TILE_SIZE, player.y)) { player.targetX += TILE_SIZE; player.isMoving = true; player.facingRight = true; }
                }
            } else {
                let dx = player.targetX - player.x; let dy = player.targetY - player.y;
                if (Math.abs(dx) <= currentSpeed) player.x = player.targetX;
                else player.x += Math.sign(dx) * currentSpeed;

                if (Math.abs(dy) <= currentSpeed) player.y = player.targetY;
                else player.y += Math.sign(dy) * currentSpeed;

                if (player.x === player.targetX && player.y === player.targetY) player.isMoving = false;
            }

            if (keys.action && !actionTriggered && !player.isMoving) {
                actionTriggered = true; let interacted = false;

                for (let bin of bins) {
                    if (checkDistance(player.x, player.y, bin.px, bin.py) < 10) {
                        interacted = true;
                        if (player.carrying === bin.type) { 
                            totalCollected += player.inventory.length;
                            player.inventory = [];
                            player.carrying = null; bin.active = true; 
                            showText("Disetor!", player.x, player.y);
                        } else {
                            if (player.carrying !== null) {
                                let oldBin = bins.find(b => b.type === player.carrying);
                                if (oldBin) oldBin.active = true;
                            }
                            player.carrying = bin.type; bin.active = false;
                        }
                        break; 
                    }
                }

                if (!interacted) {
                    for (let item of itemsMap) {
                        if (item.active && checkDistance(player.x, player.y, item.x, item.y) < 10) {
                            interacted = true;
                            if (player.carrying === null) {
                                showText("Ambil tongnya dulu!", player.x, player.y);
                            } else if (player.carrying === item.type) { 
                                player.inventory.push(item); item.active = false; 
                                showText("Sip!", player.x, player.y); 
                            } else {
                                showWrongTrashAlert = 60; // Tampilkan statwas1.png selama 1 detik
                                showText("Jangan disatukan!", player.x, player.y);
                            }
                            break;
                        }
                    }
                }

                if (!interacted && player.carrying === null) showText("Ambil tongnya dulu!", player.x, player.y);
            }
        }
    }

    // --- DRAW LOOP ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (assets.bg.complete) ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height);

        itemsMap.forEach(item => { if (item.active && item.img.complete) ctx.drawImage(item.img, item.x, item.y, TILE_SIZE, TILE_SIZE); });
        bins.forEach(bin => { if (bin.active && bin.img.complete) ctx.drawImage(bin.img, bin.px, bin.py, TILE_SIZE, TILE_SIZE); });

        activeCars.forEach(car => { if (car.img.complete && car.img.naturalWidth !== 0) ctx.drawImage(car.img, car.x, car.y, 64, 32); });

        let currentSprite = assets.charIdle;
        if (player.isMoving) currentSprite = assets.charWalk; 
        else {
            if (player.carrying === 'organik') currentSprite = assets.charO;
            else if (player.carrying === 'anorganik') currentSprite = assets.charA;
            else if (player.carrying === 'b3') currentSprite = assets.charB;
        }

        if (!currentSprite.complete || currentSprite.naturalWidth === 0) currentSprite = assets.charIdle; 

        if (fadeAlpha < 1) {
            if (currentSprite.complete && currentSprite.naturalWidth !== 0) {
                ctx.save(); 
                if (!player.facingRight) {
                    ctx.scale(-1, 1); ctx.drawImage(currentSprite, -player.x - TILE_SIZE, player.y, TILE_SIZE, TILE_SIZE);
                } else { ctx.drawImage(currentSprite, player.x, player.y, TILE_SIZE, TILE_SIZE); }
                ctx.restore();
            }
        }

        // --- LAYER UI STATUS ---
        if (assets.statwas.complete) ctx.drawImage(assets.statwas, 0, 0, 512, 288);
        
        // Tampilkan Indikator Tong Saat Ini
        if (player.carrying === 'organik' && assets.statwaso.complete) ctx.drawImage(assets.statwaso, 0, 0, 512, 288);
        else if (player.carrying === 'anorganik' && assets.statwasa.complete) ctx.drawImage(assets.statwasa, 0, 0, 512, 288);
        else if (player.carrying === 'b3' && assets.statwasb.complete) ctx.drawImage(assets.statwasb, 0, 0, 512, 288);
        
        // Peringatan Tong Salah
        if (showWrongTrashAlert > 0 && assets.statwas1.complete) ctx.drawImage(assets.statwas1, 0, 0, 512, 288);

        // Teks Hitungan Sampah (Render di area j1-k1 / x:288-352)
        ctx.fillStyle = "white";
        ctx.font = "bold 22px 'VT323', monospace";
        ctx.textAlign = "center";
        ctx.fillText(`${totalCollected} / 16`, 320, 24);

        // Teks Mengambang dalam Game
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let t = floatingTexts[i];
            ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 3;
            ctx.font = "bold 14px 'VT323', monospace, sans-serif"; ctx.textAlign = "center";
            ctx.strokeText(t.text, t.x, t.y - (60 - t.life) * 0.3); ctx.fillText(t.text, t.x, t.y - (60 - t.life) * 0.3);
            t.life--; if (t.life <= 0) floatingTexts.splice(i, 1);
        }

        // Efek Tertabrak (Hanya saat mode PLAY)
        if (fadeAlpha > 0 && currentState === STATE.PLAY) {
            ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (fadeAlpha === 1) {
                ctx.fillStyle = "white"; ctx.font = "bold 24px 'VT323', monospace, sans-serif"; ctx.textAlign = "center";
                ctx.fillText("AWAS KENDARAAN!", canvas.width / 2, canvas.height / 2);
            }
        }

        // --- LAYER POP-UP PROMPT ---
        if (currentState === STATE.EXIT_PROMPT && assets.popupexit.complete) {
            ctx.drawImage(assets.popupexit, 0, 0, 512, 288);
        }
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    gameLoop();
</script>
</body>
</html>
