<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Sorting Sampah</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            font-family: 'VT323', monospace, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            max-width: 1024px;
            aspect-ratio: 16 / 9;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            display: block;
            background-color: #222;
        }

        .ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .dpad {
            position: absolute;
            left: 8%;
            bottom: 12%;
            width: 22%;
            max-width: 160px;
            aspect-ratio: 1;
            background: url('keywasd.png') no-repeat center/contain;
            opacity: 0.5;
            pointer-events: auto;
        }

        .d-btn { position: absolute; width: 33.33%; height: 33.33%; cursor: pointer; }
        .d-up { top: 0; left: 33.33%; }
        .d-down { bottom: 0; left: 33.33%; }
        .d-left { top: 33.33%; left: 0; }
        .d-right { top: 33.33%; right: 0; }

        .btn-action {
            position: absolute;
            right: 8%;
            bottom: 15%;
            width: 12%;
            max-width: 80px;
            aspect-ratio: 1;
            background: url('keyaction.png') no-repeat center/contain;
            opacity: 0.5;
            pointer-events: auto;
            cursor: pointer;
        }

        .btn-active { opacity: 0.8 !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="512" height="288"></canvas>
    
    <div class="ui-layer">
        <div class="dpad" id="dpad-container">
            <div class="d-btn d-up" id="btn-up"></div>
            <div class="d-btn d-down" id="btn-down"></div>
            <div class="d-btn d-left" id="btn-left"></div>
            <div class="d-btn d-right" id="btn-right"></div>
        </div>
        <div class="btn-action" id="btn-action"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // --- MANAJEMEN ASET ---
    const assets = {
        bg: new Image(),
        charIdle: new Image(), charWalk: new Image(),
        charO: new Image(), charA: new Image(), charB: new Image(),
        binO: new Image(), binA: new Image(), binB: new Image(),
        // Aset Sampah
        waso1: new Image(), waso2: new Image(), waso3: new Image(), waso4: new Image(),
        wasa1: new Image(), wasa2: new Image(), wasa3: new Image(), wasa4: new Image(),
        wasb1: new Image(), wasb2: new Image()
    };
    assets.bg.src = 'kanvaswas.png';
    assets.charIdle.src = 'waschar.png';
    assets.charWalk.src = 'waschar.gif'; 
    assets.charO.src = 'wascharo.png';
    assets.charA.src = 'waschara.png';
    assets.charB.src = 'wascharb.png';
    assets.binO.src = 'waso.png';
    assets.binA.src = 'wasa.png';
    assets.binB.src = 'wasb.png';
    
    assets.waso1.src = 'waso1.png'; assets.waso2.src = 'waso2.png'; assets.waso3.src = 'waso3.png'; assets.waso4.src = 'waso4.png';
    assets.wasa1.src = 'wasa1.png'; assets.wasa2.src = 'wasa2.png'; assets.wasa3.src = 'wasa3.png'; assets.wasa4.src = 'wasa4.png';
    assets.wasb1.src = 'wasb1.png'; assets.wasb2.src = 'wasb2.png';

    const TILE_SIZE = 32;

    // Helper Konversi Koordinat
    function gridToPx(colStr, rowNum) {
        return { x: (colStr.charCodeAt(0) - 97) * TILE_SIZE, y: (rowNum - 1) * TILE_SIZE };
    }

    // --- STATE GAME ---
    let keys = { w: false, a: false, s: false, d: false, action: false };
    let actionTriggered = false;
    let floatingTexts = [];

    // Player Spawn di f9
    let player = {
        x: gridToPx('f', 9).x, y: gridToPx('f', 9).y,
        targetX: gridToPx('f', 9).x, targetY: gridToPx('f', 9).y,
        speed: 2.5, carrying: null, isMoving: false, facingRight: true
    };

    let bins = [
        { type: 'organik', px: gridToPx('b', 9).x, py: gridToPx('b', 9).y, active: true, img: assets.binO },
        { type: 'anorganik', px: gridToPx('c', 9).x, py: gridToPx('c', 9).y, active: true, img: assets.binA },
        { type: 'b3', px: gridToPx('d', 9).x, py: gridToPx('d', 9).y, active: true, img: assets.binB }
    ];

    // Data Mapping Sampah
    const trashData = [
        { id: 'waso1', type: 'organik', img: assets.waso1, locs: ['m4'] },
        { id: 'waso2', type: 'organik', img: assets.waso2, locs: ['a6','b6','h5','m9','o6'] },
        { id: 'waso3', type: 'organik', img: assets.waso3, locs: ['m6'] },
        { id: 'waso4', type: 'organik', img: assets.waso4, locs: ['n9'] },
        { id: 'wasa1', type: 'anorganik', img: assets.wasa1, locs: ['e2','p9'] },
        { id: 'wasa2', type: 'anorganik', img: assets.wasa2, locs: ['k6'] },
        { id: 'wasa3', type: 'anorganik', img: assets.wasa3, locs: ['h3'] },
        { id: 'wasa4', type: 'anorganik', img: assets.wasa4, locs: ['b4','d6'] },
        { id: 'wasb1', type: 'b3', img: assets.wasb1, locs: ['p2'] },
        { id: 'wasb2', type: 'b3', img: assets.wasb2, locs: ['a4'] }
    ];

    let itemsMap = [];
    // Parsing lokasi sampah menjadi array objek terpisah
    trashData.forEach(t => {
        t.locs.forEach(loc => {
            let col = loc.charAt(0);
            let row = parseInt(loc.substring(1));
            let pos = gridToPx(col, row);
            itemsMap.push({ x: pos.x, y: pos.y, type: t.type, img: t.img, active: true });
        });
    });

    // --- SISTEM COLLISION ---
    function isSolid(x, y) {
        let col = Math.round(x / TILE_SIZE);
        let row = Math.round(y / TILE_SIZE);
        if (row === 0) return true; // a1-p1 (Baris 1)
        if (col === 15 && row === 3) return true; // p4
        return false;
    }

    function hasTopWall(x, y) {
        let col = Math.round(x / TILE_SIZE);
        let row = Math.round(y / TILE_SIZE);
        if ((col === 13 || col === 14) && row === 2) return true; // n3-o3
        if (col >= 0 && col <= 3 && row === 4) return true; // a5-d5
        if (col >= 8 && col <= 15 && row === 4) return true; // i5-p5
        if (col === 4 && row === 5) return true; // e6
        if (col === 0 && row === 8) return true; // a9
        return false;
    }

    // --- KONTROL INPUT ---
    function setKey(k, val) { keys[k] = val; }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'w' || e.key === 'ArrowUp') setKey('w', true);
        if (e.key === 's' || e.key === 'ArrowDown') setKey('s', true);
        if (e.key === 'a' || e.key === 'ArrowLeft') setKey('a', true);
        if (e.key === 'd' || e.key === 'ArrowRight') setKey('d', true);
        if (e.key === ' ' || e.key === 'Enter') setKey('action', true);
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'w' || e.key === 'ArrowUp') setKey('w', false);
        if (e.key === 's' || e.key === 'ArrowDown') setKey('s', false);
        if (e.key === 'a' || e.key === 'ArrowLeft') setKey('a', false);
        if (e.key === 'd' || e.key === 'ArrowRight') setKey('d', false);
        if (e.key === ' ' || e.key === 'Enter') { setKey('action', false); actionTriggered = false; }
    });

    const dpadZones = [ { id: 'btn-up', key: 'w' }, { id: 'btn-down', key: 's' }, { id: 'btn-left', key: 'a' }, { id: 'btn-right', key: 'd' } ];
    dpadZones.forEach(zone => {
        let el = document.getElementById(zone.id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); setKey(zone.key, true); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); setKey(zone.key, false); });
        el.addEventListener('mousedown', (e) => { e.preventDefault(); setKey(zone.key, true); });
        el.addEventListener('mouseup', (e) => { e.preventDefault(); setKey(zone.key, false); });
        el.addEventListener('mouseleave', (e) => { e.preventDefault(); setKey(zone.key, false); });
    });

    let btnAct = document.getElementById('btn-action');
    btnAct.addEventListener('touchstart', (e) => { e.preventDefault(); setKey('action', true); btnAct.classList.add('btn-active'); });
    btnAct.addEventListener('touchend', (e) => { e.preventDefault(); setKey('action', false); actionTriggered = false; btnAct.classList.remove('btn-active'); });
    btnAct.addEventListener('mousedown', (e) => { e.preventDefault(); setKey('action', true); btnAct.classList.add('btn-active'); });
    btnAct.addEventListener('mouseup', (e) => { e.preventDefault(); setKey('action', false); actionTriggered = false; btnAct.classList.remove('btn-active'); });
    btnAct.addEventListener('mouseleave', (e) => { e.preventDefault(); setKey('action', false); actionTriggered = false; btnAct.classList.remove('btn-active'); });

    // --- UTILITAS ---
    function showText(text, x, y) {
        floatingTexts.push({ text: text, x: x + 16, y: y, life: 60 });
    }

    function checkDistance(x1, y1, x2, y2) {
        return Math.sqrt(Math.pow((x1+16) - (x2+16), 2) + Math.pow((y1+16) - (y2+16), 2));
    }

    // --- UPDATE LOOP ---
    function update() {
        if (!player.isMoving) {
            if (keys.w && player.y > 0) { 
                // Gerak ATAS: Cek apakah kotak yang diinjak punya Tembok Atas, lalu cek Solid di target
                if (!hasTopWall(player.x, player.y) && !isSolid(player.x, player.y - TILE_SIZE)) {
                    player.targetY -= TILE_SIZE; player.isMoving = true; 
                }
            } else if (keys.s && player.y < canvas.height - TILE_SIZE) { 
                // Gerak BAWAH: Cek Solid di target, lalu cek apakah target punya Tembok Atas
                if (!isSolid(player.x, player.y + TILE_SIZE) && !hasTopWall(player.x, player.y + TILE_SIZE)) {
                    player.targetY += TILE_SIZE; player.isMoving = true; 
                }
            } else if (keys.a && player.x > 0) { 
                if (!isSolid(player.x - TILE_SIZE, player.y)) {
                    player.targetX -= TILE_SIZE; player.isMoving = true; player.facingRight = false;
                }
            } else if (keys.d && player.x < canvas.width - TILE_SIZE) { 
                if (!isSolid(player.x + TILE_SIZE, player.y)) {
                    player.targetX += TILE_SIZE; player.isMoving = true; player.facingRight = true;
                }
            }
        } else {
            let dx = player.targetX - player.x;
            let dy = player.targetY - player.y;

            if (Math.abs(dx) <= player.speed) player.x = player.targetX;
            else player.x += Math.sign(dx) * player.speed;

            if (Math.abs(dy) <= player.speed) player.y = player.targetY;
            else player.y += Math.sign(dy) * player.speed;

            if (player.x === player.targetX && player.y === player.targetY) {
                player.isMoving = false;
            }
        }

        if (keys.action && !actionTriggered) {
            actionTriggered = true;
            let interacted = false;

            if (!player.isMoving) {
                // 1. Cek Interaksi dengan Markas Tong Sampah
                for (let bin of bins) {
                    if (checkDistance(player.x, player.y, bin.px, bin.py) < 10) {
                        interacted = true;
                        if (player.carrying === bin.type) {
                            player.carrying = null; bin.active = true;
                        } else {
                            if (player.carrying !== null) {
                                let oldBin = bins.find(b => b.type === player.carrying);
                                if (oldBin) oldBin.active = true;
                            }
                            player.carrying = bin.type; bin.active = false;
                        }
                        break; 
                    }
                }

                // 2. Cek Interaksi dengan Item Sampah di tanah
                if (!interacted) {
                    for (let item of itemsMap) {
                        if (item.active && checkDistance(player.x, player.y, item.x, item.y) < 10) {
                            interacted = true;
                            if (player.carrying === null) {
                                showText("Ambil tongnya dulu!", player.x, player.y);
                            } else if (player.carrying === item.type) {
                                item.active = false; // Berhasil dipungut
                                showText("Sip!", player.x, player.y);
                            } else {
                                showText("Jangan disatukan!", player.x, player.y);
                            }
                            break;
                        }
                    }
                }

                // Jika mencet tombol tapi tidak ada apa-apa
                if (!interacted && player.carrying === null) {
                    showText("Ambil tongnya dulu!", player.x, player.y);
                }
            }
        }
    }

    // --- DRAW LOOP ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (assets.bg.complete) ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height);

        // Render Item Sampah
        itemsMap.forEach(item => {
            if (item.active && item.img.complete) {
                ctx.drawImage(item.img, item.x, item.y, TILE_SIZE, TILE_SIZE);
            }
        });

        // Render Markas Tong Sampah
        bins.forEach(bin => {
            if (bin.active && bin.img.complete) {
                ctx.drawImage(bin.img, bin.px, bin.py, TILE_SIZE, TILE_SIZE);
            }
        });

        // Penentuan Sprite Karakter
        let currentSprite = assets.charIdle;
        if (player.isMoving) {
            currentSprite = assets.charWalk; 
        } else {
            if (player.carrying === 'organik') currentSprite = assets.charO;
            else if (player.carrying === 'anorganik') currentSprite = assets.charA;
            else if (player.carrying === 'b3') currentSprite = assets.charB;
        }

        if (!currentSprite.complete || currentSprite.naturalWidth === 0) {
            currentSprite = assets.charIdle; 
        }

        // Render Karakter dengan Mirroring
        if (currentSprite.complete && currentSprite.naturalWidth !== 0) {
            ctx.save(); 
            if (!player.facingRight) {
                ctx.scale(-1, 1);
                ctx.drawImage(currentSprite, -player.x - TILE_SIZE, player.y, TILE_SIZE, TILE_SIZE);
            } else {
                ctx.drawImage(currentSprite, player.x, player.y, TILE_SIZE, TILE_SIZE);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = "hotpink";
            ctx.fillRect(player.x, player.y, TILE_SIZE, TILE_SIZE);
        }

        // Render Peringatan Teks
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let t = floatingTexts[i];
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 3;
            ctx.font = "bold 14px 'VT323', monospace, sans-serif";
            ctx.textAlign = "center";
            ctx.strokeText(t.text, t.x, t.y - (60 - t.life) * 0.3);
            ctx.fillText(t.text, t.x, t.y - (60 - t.life) * 0.3);
            t.life--;
            if (t.life <= 0) floatingTexts.splice(i, 1);
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
